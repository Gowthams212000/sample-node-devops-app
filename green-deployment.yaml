apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app-green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-app
      version: green
  template:
    metadata:
      labels:
        app: sample-app
        version: green
    spec:
      containers:
      - name: app
        image: sample-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
